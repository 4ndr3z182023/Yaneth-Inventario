<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaneth | Control Total</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --fondo: #f1f5f9; --texto: #0f172a; --verde: #16a34a; --azul: #2563eb; --rojo: #dc2626; --borde: #cbd5e1; }
        body { font-family: 'Inter', sans-serif; background: var(--fondo); margin: 0; padding: 20px; color: var(--texto); }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .cierre-box { background: #fff; padding: 25px; border-radius: 20px; border: 2px solid #0f172a; margin-bottom: 25px; }
        .flex-inputs { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 15px; }
        .input-group { flex: 1; min-width: 200px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--borde); box-sizing: border-box; }
        
        .input-tabla { border: 1px solid transparent; background: #f8fafc; padding: 8px; border-radius: 6px; font-weight: 600; width: 100%; }
        .input-tabla:focus { border-color: var(--azul); background: #fff; outline: none; }

        .table-wrap { background: white; border-radius: 20px; overflow: auto; border: 1px solid var(--borde); margin-bottom: 40px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { padding: 15px; font-size: 11px; text-transform: uppercase; color: #64748b; border-bottom: 2px solid var(--fondo); text-align: left; background: #fdfdfd; }
        td { padding: 8px 15px; border-bottom: 1px solid var(--fondo); }

        .historial-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .fecha-card { background: white; padding: 18px; border-radius: 15px; border: 1px solid var(--borde); position: relative; transition: 0.2s; }
        .fecha-card:hover { border-color: var(--azul); }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); padding: 10px; }
        .modal { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; color: white; }
        
        .btn-venta { background: var(--verde); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 800; width: 100%; }
        .btn-borrar { color: var(--borde); border: none; background: none; cursor: pointer; font-size: 18px; }
        .btn-borrar:hover { color: var(--rojo); }

        .badge-venta { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 6px; font-weight: 800; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:#b91c1c; font-weight:800; letter-spacing:-1px; margin:0;">🍺  YANETH | INVENTARIO</h2>
        <button onclick="agregarFilaNueva()" style="background:var(--azul); color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:800; cursor:pointer">
            <i class="fas fa-plus"></i> NUEVO PRODUCTO
        </button>
    </div>

    <!-- PANEL DE CIERRE -->
    <div class="cierre-box">
        <div class="flex-inputs">
            <div class="input-group">
                <label>Fecha de Cierre</label>
                <input type="date" id="fechaCierre">
            </div>
            <div class="input-group">
                <label>Nota / Deuda</label>
                <input type="text" id="deudaHoy" placeholder="Ej: Yaneth debe 20k...">
            </div>
        </div>
        <button class="btn-main" style="background:#0f172a;" onclick="procesarCierre()">
            <i class="fas fa-save"></i> GUARDAR CIERRE Y RESETEAR STOCK INICIAL
        </button>
    </div>

    <!-- TABLA PRINCIPAL -->
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Inicial</th>
                    <th>Actual</th>
                    <th>Ventas</th>
                    <th style="width:120px">Acción</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="listaInventario"></tbody>
        </table>
    </div>

    <h3 style="margin-bottom:20px;"><i class="fas fa-clock-rotate-left"></i> Historial de Turnos</h3>
    <div class="historial-grid" id="panelHistorial"></div>
</div>

<!-- MODAL: DETALLE COMPLETO -->
<div id="modalDetalle" class="overlay">
    <div class="modal">
        <h3 id="detTitulo" style="margin-top:0; color:var(--azul)">Detalle del Turno</h3>
        <div class="table-wrap" style="margin-bottom:15px">
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Inic.</th>
                        <th>Act.</th>
                        <th>Cant.</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody id="detContenidoTabla"></tbody>
            </table>
        </div>
        <div id="detNota" style="padding:10px; background:#fefce8; border-radius:8px; margin-bottom:15px; font-size:14px; border:1px solid #fef08a; display:none"></div>
        <button onclick="cerrarModal('modalDetalle')" class="btn-main" style="background:#64748b">Cerrar Detalle</button>
    </div>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyCFEr14U1juOZkovDJE1UjXstduHNT_fi8",
        authDomain: "yaneth-inventario.firebaseapp.com",
        databaseURL: "https://yaneth-inventario-default-rtdb.firebaseio.com",
        projectId: "yaneth-inventario",
        storageBucket: "yaneth-inventario.firebasestorage.app",
        messagingSenderId: "711305869867",
        appId: "1:711305869867:web:72ad4e91a0cfa404a5886e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let datosActuales = {};

    document.getElementById('fechaCierre').valueAsDate = new Date();

    // RENDERIZAR TABLA PRINCIPAL
    db.ref('inventario').on('value', (snap) => {
        datosActuales = snap.val() || {};
        const tbody = document.getElementById('listaInventario');
        tbody.innerHTML = "";

        Object.keys(datosActuales).forEach(id => {
            const a = datosActuales[id];
            const inic = parseInt(a.inicial) || 0;
            const act = parseInt(a.actual) || 0;
            const v = inic - act;

            tbody.innerHTML += `<tr>
                <td><input type="text" class="input-tabla" value="${a.nombre}" onchange="update('${id}','nombre',this.value)"></td>
                <td><input type="number" class="input-tabla" value="${a.costo}" onchange="update('${id}','costo',this.value)"></td>
                <td><input type="number" class="input-tabla" value="${inic}" onchange="update('${id}','inicial',this.value)"></td>
                <td><input type="number" class="input-tabla" value="${act}" onchange="update('${id}','actual',this.value)" style="color:var(--rojo)"></td>
                <td><span class="badge-venta">${v < 0 ? 0 : v}</span></td>
                <td><button onclick="ventaRapida('${id}')" class="btn-venta"><i class="fas fa-beer"></i> VENTA</button></td>
                <td><button onclick="borrarProd('${id}')" class="btn-borrar"><i class="fas fa-times"></i></button></td>
            </tr>`;
        });
    });

    // RENDERIZAR HISTORIAL
    db.ref('historico_cierres').on('value', (snap) => {
        const h = snap.val() || {};
        const panel = document.getElementById('panelHistorial');
        panel.innerHTML = "";
        Object.keys(h).sort().reverse().forEach(llave => {
            const d = h[llave];
            panel.innerHTML += `
                <div class="fecha-card">
                    <div style="display:flex; justify-content:space-between">
                        <small style="font-weight:800; color:#64748b">${llave}</small>
                        <button onclick="borrarHist('${llave}')" style="border:none; background:none; color:#cbd5e1; cursor:pointer"><i class="fas fa-trash"></i></button>
                    </div>
                    <p style="font-size:24px; font-weight:800; color:var(--azul); margin:10px 0">${d.totalVendido}</p>
                    <button onclick="verDetalle('${llave}')" class="btn-main" style="background:#f1f5f9; color:var(--texto); border:1px solid var(--borde); padding:8px; font-size:12px">
                        <i class="fas fa-eye"></i> VER DETALLE COMPLETO
                    </button>
                </div>`;
        });
    });

    function update(id, campo, val) {
        let v = (campo === 'nombre') ? val : parseInt(val) || 0;
        db.ref('inventario/' + id).update({ [campo]: v });
    }

    function ventaRapida(id) {
        db.ref('inventario/' + id).transaction(a => {
            if(a && (parseInt(a.actual) || 0) > 0) a.actual = (parseInt(a.actual) || 0) - 1;
            return a;
        });
    }

    function agregarFilaNueva() {
        const id = Date.now();
        db.ref('inventario/' + id).set({ nombre: "Nuevo", costo: 0, inicial: 0, actual: 0 });
    }

    function borrarProd(id) { if(confirm("¿Eliminar producto?")) db.ref('inventario/' + id).remove(); }
    function borrarHist(llave) { if(confirm("¿Eliminar este cierre?")) db.ref('historico_cierres/' + llave).remove(); }

    function procesarCierre() {
        const f = document.getElementById('fechaCierre').value;
        if(!f) return alert("Fecha obligatoria");
        
        let det = [];
        let granTotal = 0;

        Object.keys(datosActuales).forEach(id => {
            const a = datosActuales[id];
            const i = parseInt(a.inicial) || 0;
            const act = parseInt(a.actual) || 0;
            const v = i - act;
            if(v > 0) {
                const sub = v * (parseInt(a.costo) || 0);
                det.push({ n: a.nombre, pre: a.costo, ini: i, act: act, cant: v, sub: sub });
                granTotal += sub;
            }
        });

        if(det.length === 0) return alert("No hay ventas para cerrar.");

        const ahora = new Date();
        const llave = `${f} ${ahora.getHours().toString().padStart(2,'0')}:${ahora.getMinutes().toString().padStart(2,'0')}`;

        if(confirm("¿Guardar cierre? El stock actual pasará a ser el nuevo inicial.")) {
            db.ref('historico_cierres/' + llave).set({
                totalVendido: `$${granTotal.toLocaleString()}`,
                productos: det,
                nota: document.getElementById('deudaHoy').value
            }).then(() => {
                let updates = {};
                Object.keys(datosActuales).forEach(id => {
                    updates[`inventario/${id}/inicial`] = datosActuales[id].actual;
                });
                db.ref().update(updates).then(() => {
                    alert("✅ Cierre guardado con éxito.");
                    document.getElementById('deudaHoy').value = "";
                });
            });
        }
    }

    function verDetalle(llave) {
        db.ref('historico_cierres/' + llave).once('value', s => {
            const d = s.val();
            const tbody = document.getElementById('detContenidoTabla');
            const notaDiv = document.getElementById('detNota');
            document.getElementById('detTitulo').innerText = "Detalle: " + llave;
            tbody.innerHTML = "";
            
            d.productos.forEach(p => {
                tbody.innerHTML += `<tr>
                    <td><b>${p.n}</b></td>
                    <td>$${p.pre}</td>
                    <td>${p.ini}</td>
                    <td>${p.act}</td>
                    <td style="color:var(--verde); font-weight:800">${p.cant}</td>
                    <td>$${p.sub.toLocaleString()}</td>
                </tr>`;
            });

            tbody.innerHTML += `<tr><td colspan="5" style="text-align:right"><b>TOTAL:</b></td><td style="font-size:18px; font-weight:800; color:var(--azul)">${d.totalVendido}</td></tr>`;

            if(d.nota) {
                notaDiv.innerHTML = `<b>NOTA/DEUDA:</b> ${d.nota}`;
                notaDiv.style.display = 'block';
            } else {
                notaDiv.style.display = 'none';
            }
            
            document.getElementById('modalDetalle').style.display = 'flex';
        });
    }

    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
