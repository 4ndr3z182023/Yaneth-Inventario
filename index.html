<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Yaneth | Detalle y Turnos</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --fondo: #f1f5f9; --texto: #0f172a; --verde: #16a34a; --azul: #2563eb; --rojo: #dc2626; --naranja: #f59e0b; --borde: #cbd5e1; }
        body { font-family: 'Inter', sans-serif; background: var(--fondo); margin: 0; padding: 20px; color: var(--texto); }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Cierre Box */
        .cierre-box { background: #fff; padding: 25px; border-radius: 20px; border: 2px solid #0f172a; margin-bottom: 25px; }
        .flex-inputs { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 15px; }
        .input-group { flex: 1; min-width: 200px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--borde); box-sizing: border-box; font-family: inherit; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid var(--borde); text-align: center; }
        .stat-card b { display: block; font-size: 28px; color: var(--verde); }

        /* Tabla Principal */
        .table-wrap { background: white; border-radius: 20px; overflow: auto; border: 1px solid var(--borde); margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; font-size: 11px; text-transform: uppercase; color: #64748b; border-bottom: 2px solid var(--fondo); text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--fondo); }

        /* Historial */
        .historial-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .fecha-card { background: white; padding: 18px; border-radius: 15px; border: 1px solid var(--borde); position: relative; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .deuda-tag { background: #fff7ed; color: #9a3412; padding: 8px; border-radius: 8px; font-size: 12px; margin-top: 10px; border: 1px solid #ffedd5; }
        
        /* Modales */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal { background: white; padding: 25px; border-radius: 20px; width: 95%; max-width: 500px; max-height: 85vh; overflow-y: auto; position: relative; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; color: white; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }

        /* Estilo Detalle Interno */
        .detalle-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#b91c1c; font-weight:800; letter-spacing:-1px;">🍺 BAR YANETH | SISTEMA INTEGRAL</h2>

    <!-- CIERRE DE TURNO -->
    <div class="cierre-box">
        <div class="flex-inputs">
            <div class="input-group">
                <label>Fecha de Cierre</label>
                <input type="date" id="fechaCierre">
            </div>
            <div class="input-group">
                <label>Pendientes / Deuda de Yaneth</label>
                <input type="text" id="deudaHoy" placeholder="Escribe aquí si quedó debiendo...">
            </div>
        </div>
        <button class="btn-main" style="background:#0f172a;" onclick="procesarCierre()">
            <i class="fas fa-check-circle"></i> GUARDAR CIERRE DE TURNO
        </button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><span>VALOR EN NEVERA</span><b id="totalInv">$0</b></div>
        <div class="stat-card"><span>VENTA ESTE TURNO</span><b id="totalVentasGeneral" style="color:var(--azul)">$0</b></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr><th>Producto</th><th>Precio</th><th>Inicial</th><th>Actual</th><th>Ventas</th><th>Acción</th></tr>
            </thead>
            <tbody id="listaInventario"></tbody>
        </table>
    </div>

    <hr style="border:none; border-top:2px dashed var(--borde); margin: 40px 0;">

    <h3 style="margin-bottom:20px;"><i class="fas fa-history"></i> Historial de Turnos</h3>
    <div class="historial-grid" id="panelHistorial"></div>
</div>

<!-- MODAL: VER DETALLE -->
<div id="modalDetalle" class="overlay">
    <div class="modal">
        <h3 id="detTitulo" style="margin-top:0; color:var(--azul)">Detalle del Turno</h3>
        <div id="detContenido"></div>
        <button onclick="cerrarModal('modalDetalle')" class="btn-main" style="background:#64748b">Cerrar</button>
    </div>
</div>

<!-- MODAL: EDITAR -->
<div id="modalEdit" class="overlay">
    <div class="modal">
        <h3 style="margin-top:0">Editar Reporte</h3>
        <div id="editLista"></div>
        <div style="margin-top:15px">
            <label>Nota / Deuda:</label>
            <textarea id="editDeuda" rows="2"></textarea>
        </div>
        <div style="margin-top:20px; text-align:right; border-top:2px solid #eee; padding-top:15px">
            <span style="font-size:12px; color:#64748b">RECALCULO:</span>
            <div id="nuevoTotalCalc" style="font-size:24px; font-weight:800; color:var(--verde)">$0</div>
        </div>
        <button onclick="guardarCambiosHistorial()" class="btn-main" style="background:var(--verde)">GUARDAR CAMBIOS</button>
        <button onclick="cerrarModal('modalEdit')" class="btn-main" style="background:none; color:gray; border:1px solid #ccc">Cancelar</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCFEr14U1juOZkovDJE1UjXstduHNT_fi8",
        authDomain: "yaneth-inventario.firebaseapp.com",
        databaseURL: "https://yaneth-inventario-default-rtdb.firebaseio.com",
        projectId: "yaneth-inventario",
        storageBucket: "yaneth-inventario.firebasestorage.app",
        messagingSenderId: "711305869867",
        appId: "1:711305869867:web:72ad4e91a0cfa404a5886e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let datosActuales = {};
    let fechaEditando = null;
    let productosEditando = [];
    let preciosReferencia = {};

    document.getElementById('fechaCierre').valueAsDate = new Date();

    // Sincronizar Inventario
    db.ref('inventario').on('value', (snap) => {
        datosActuales = snap.val() || {};
        const tbody = document.getElementById('listaInventario');
        let sumaInv = 0; let sumaHoy = 0;
        tbody.innerHTML = "";
        Object.keys(datosActuales).forEach(id => {
            const a = datosActuales[id];
            const v = a.inicial - a.actual;
            preciosReferencia[a.nombre] = a.costo;
            sumaInv += (a.actual * a.costo); sumaHoy += (v * a.costo);
            tbody.innerHTML += `<tr>
                <td><b>${a.nombre}</b></td><td>$${a.costo}</td><td>${a.inicial}</td>
                <td style="color:var(--rojo);font-weight:800">${a.actual}</td><td>${v}</td>
                <td><button onclick="registrarVenta('${id}')" style="background:var(--verde); color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:800">+ VENTA</button></td>
            </tr>`;
        });
        document.getElementById('totalInv').innerText = `$${sumaInv.toLocaleString()}`;
        document.getElementById('totalVentasGeneral').innerText = `$${sumaHoy.toLocaleString()}`;
    });

    // Sincronizar Historial
    db.ref('historico_cierres').on('value', (snap) => {
        const h = snap.val() || {};
        const panel = document.getElementById('panelHistorial');
        panel.innerHTML = "";
        Object.keys(h).sort().reverse().forEach(llave => {
            const d = h[llave];
            panel.innerHTML += `
                <div class="fecha-card">
                    <div style="display:flex; justify-content:space-between; align-items:start">
                        <small style="color:#64748b; font-weight:800">${llave}</small>
                        <button onclick="borrarH('${llave}')" style="background:none; border:none; color:var(--rojo); cursor:pointer"><i class="fas fa-trash"></i></button>
                    </div>
                    <p style="margin:10px 0; font-size:24px; font-weight:800; color:var(--azul)">${d.totalVendido}</p>
                    ${d.deuda ? `<div class="deuda-tag"><b>Nota:</b> ${d.deuda}</div>` : ''}
                    
                    <div style="display:flex; gap:8px; margin-top:15px">
                        <button onclick="verDetalle('${llave}')" style="flex:1; background:#f1f5f9; color:var(--texto); border:1px solid var(--borde); padding:10px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:800"><i class="fas fa-list"></i> VER DETALLE</button>
                        <button onclick="abrirEditor('${llave}')" style="background:var(--azul); color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:800"><i class="fas fa-edit"></i></button>
                    </div>
                </div>`;
        });
    });

    function registrarVenta(id) { db.ref('inventario/' + id).transaction(a => { if(a && a.actual > 0) a.actual--; return a; }); }

    function procesarCierre() {
        const f = document.getElementById('fechaCierre').value;
        const deuda = document.getElementById('deudaHoy').value;
        if(!f) return alert("Selecciona una fecha.");
        
        const ahora = new Date();
        const hora = ahora.getHours().toString().padStart(2, '0');
        const min = ahora.getMinutes().toString().padStart(2, '0');
        const p = f.split('-'); 
        const llaveUnica = `${p[0]}-${p[1]}-${p[2]} ${hora}:${min}`;

        if(confirm(`¿Guardar cierre de este turno?`)) {
            let det = [];
            Object.keys(datosActuales).forEach(id => {
                const a = datosActuales[id]; const v = a.inicial - a.actual;
                if(v > 0) det.push({ n: a.nombre, c: v, s: (v * a.costo) });
            });
            
            db.ref('historico_cierres/' + llaveUnica).set({ 
                totalVendido: document.getElementById('totalVentasGeneral').innerText, 
                productos: det,
                deuda: deuda 
            }).then(() => {
                const ups = {}; 
                Object.keys(datosActuales).forEach(id => ups[`inventario/${id}/inicial`] = datosActuales[id].actual);
                db.ref().update(ups).then(() => {
                    alert("Cierre guardado.");
                    document.getElementById('deudaHoy').value = "";
                });
            });
        }
    }

    // FUNCIÓN VER DETALLE
    function verDetalle(llave) {
        db.ref('historico_cierres/' + llave).once('value', s => {
            const data = s.val();
            const cont = document.getElementById('detContenido');
            document.getElementById('detTitulo').innerText = "Ventas: " + llave;
            cont.innerHTML = "";
            
            if(!data.productos || data.productos.length === 0) {
                cont.innerHTML = "<p>No hubo ventas en este turno.</p>";
            } else {
                data.productos.forEach(p => {
                    cont.innerHTML += `
                        <div class="detalle-item">
                            <span><b>${p.c}x</b> ${p.n}</span>
                            <span>$${p.s.toLocaleString()}</span>
                        </div>`;
                });
                cont.innerHTML += `<div style="text-align:right; margin-top:15px; font-size:18px; font-weight:800">TOTAL: ${data.totalVendido}</div>`;
            }
            document.getElementById('modalDetalle').style.display = 'flex';
        });
    }

    // GESTIÓN DE EDICIÓN
    function abrirEditor(llave) {
        fechaEditando = llave;
        db.ref('historico_cierres/' + llave).once('value', s => {
            const data = s.val();
            productosEditando = data.productos || [];
            document.getElementById('editDeuda').value = data.deuda || "";
            renderizarEditor();
            document.getElementById('modalEdit').style.display = 'flex';
        });
    }

    function renderizarEditor() {
        const cont = document.getElementById('editLista');
        cont.innerHTML = ""; let total = 0;
        productosEditando.forEach((p, i) => {
            const sub = p.c * (preciosReferencia[p.n] || 0);
            total += sub;
            cont.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #eee">
                <span><b>${p.n}</b></span>
                <input type="number" value="${p.c}" onchange="actCant(${i}, this.value)" style="width:60px; text-align:center; padding:5px; border-radius:5px; border:1px solid #ccc">
            </div>`;
        });
        document.getElementById('nuevoTotalCalc').innerText = `$${total.toLocaleString()}`;
    }

    function actCant(i, v) {
        productosEditando[i].c = parseInt(v) || 0;
        productosEditando[i].s = productosEditando[i].c * (preciosReferencia[productosEditando[i].n] || 0);
        renderizarEditor();
    }

    function guardarCambiosHistorial() {
        let t = 0; productosEditando.forEach(p => t += p.s);
        db.ref('historico_cierres/' + fechaEditando).update({
            totalVendido: `$${t.toLocaleString()}`,
            productos: productosEditando,
            deuda: document.getElementById('editDeuda').value
        }).then(() => { alert("Actualizado."); cerrarModal('modalEdit'); });
    }

    function borrarH(llave) { if(confirm("¿Eliminar este cierre permanentemente?")) db.ref('historico_cierres/' + llave).remove(); }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
